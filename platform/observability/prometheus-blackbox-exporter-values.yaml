apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-blackbox-exporter-values
  namespace: monitoring
data:
  values.yaml: |
    fullnameOverride: prometheus-blackbox-exporter
    serviceMonitor:
      enabled: false
    prometheusRule:
      enabled: false
    config:
      modules:
        https_2xx:
          prober: http
          timeout: 10s
          http:
            method: GET
            preferred_ip_protocol: ip4
            valid_http_versions:
              - HTTP/1.1
              - HTTP/2.0
            valid_status_codes:
              - 200
            follow_redirects: true
            fail_if_not_ssl: true
            fail_if_body_matches_regexp:
              - '(?i)<title>\s*(error|not found|service unavailable)\s*</title>'
            tls_config:
              insecure_skip_verify: false
        https_json_health:
          prober: http
          timeout: 10s
          http:
            method: GET
            preferred_ip_protocol: ip4
            valid_http_versions:
              - HTTP/1.1
              - HTTP/2.0
            valid_status_codes:
              - 200
            follow_redirects: true
            fail_if_not_ssl: true
            fail_if_body_not_matches_regexp:
              - '^.{0,4096}("status"\s*:\s*"(ok|healthy|live|ready)"|"ok"\s*:\s*true|ok|healthy|live|ready).{0,4096}$'
            tls_config:
              insecure_skip_verify: false
        https_static_content:
          prober: http
          timeout: 10s
          http:
            method: GET
            preferred_ip_protocol: ip4
            valid_http_versions:
              - HTTP/1.1
              - HTTP/2.0
            valid_status_codes:
              - 200
            follow_redirects: true
            fail_if_not_ssl: true
            fail_if_body_not_matches_regexp:
              - '(?i)(dspace|token.place|daniel smith|jobbot3000|manifest|resume|metadata)'
            tls_config:
              insecure_skip_verify: false

# Production overlay values layered on top of tokenplace.values.dev.yaml.
environment: prod

ingress:
  enabled: true
  className: traefik
  host: token.place
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
  tls:
    enabled: true
    secretName: tokenplace-prod-tls

env:
  TOKEN_PLACE_ENV: production
  TOKENPLACE_RELAY_PUBLIC_URL: https://token.place

# Example values for deploying democratized.space to production via Helm.
# The ingress host is set by the installer command or this file.
environment: prod

ingress:
  enabled: true
  className: traefik
  # Keep production deploys on a prod subdomain until final apex cutover.
  # Override with host=democratized.space in just commands during cutover.
  host: prod.democratized.space

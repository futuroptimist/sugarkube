# Example values for steady-state production (apex) deploys via Helm.
# The ingress host is democratized.space unless intentionally overridden.
environment: prod

ingress:
  enabled: true
  className: traefik
  host: democratized.space

# Runtime token.place routing for the immutable DSPACE image.
env:
  - name: DSPACE_TOKEN_PLACE_URL
    value: https://token.place
  - name: DSPACE_TOKEN_PLACE_CHAT_MODEL
    value: gpt-5-chat-latest

# Base/shared token.place values consumed alongside environment overlays.
environment: dev
replicaCount: 1

image:
  repository: ghcr.io/futuroptimist/tokenplace-relay

ingress:
  enabled: true
  className: traefik
  annotations: {}

env:
  RELAY_WORKERS: "1"
  TOKENPLACE_FRONTEND_MODE: production
  TOKENPLACE_RELAY_REQUIRE_UPSTREAM_HEALTH: "0"

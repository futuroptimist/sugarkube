# Staging overlay values layered on top of tokenplace.values.dev.yaml.
environment: staging

ingress:
  enabled: true
  className: traefik
  host: staging.token.place
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
  tls:
    enabled: true
    secretName: tokenplace-staging-tls

env:
  TOKEN_PLACE_ENV: staging
  TOKENPLACE_RELAY_PUBLIC_URL: https://staging.token.place

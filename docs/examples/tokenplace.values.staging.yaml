# Staging overlay values layered on top of tokenplace.values.dev.yaml.
environment: staging

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
  host: staging.token.place
  tls:
    enabled: true
    secretName: staging-tokenplace-tls

env:
  TOKEN_PLACE_ENV: staging
  TOKENPLACE_RELAY_PUBLIC_URL: https://staging.token.place

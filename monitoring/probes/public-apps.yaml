apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: blackbox-dspace-staging-root
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: dspace
    environment: staging
    route: root
    criticality: critical
spec:
  interval: 60s
  module: https_2xx
  prober:
    url: prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
    scheme: http
    path: /probe
  targets:
    staticConfig:
      static:
        - https://staging.democratized.space/
      labels:
        app: dspace
        environment: staging
        route: root
        criticality: critical
---
